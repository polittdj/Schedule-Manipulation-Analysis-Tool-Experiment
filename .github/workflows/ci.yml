name: CI

# Greenfield placeholder CI.
#
# main was reset to a clean starting point and has no application code yet, so there is
# nothing to lint/type/test. This workflow keeps the SAME status-check contexts
# (`test (3.11)`, `test (3.13)`, `check`) the prior pipeline exposed, so branch protection
# stays satisfied and pull requests remain mergeable. Session A1 replaces this with the
# real lint + types + tests + security + parity pipeline (see AUTONOMOUS-BUILD-PROMPT.md §7).

on:
  push:
    branches: ["**"]
  pull_request:

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.13"]
    steps:
      - uses: actions/checkout@v4
      - name: Greenfield placeholder
        run: |
          echo "Greenfield main — no build to test yet (python ${{ matrix.python-version }})."
          test -f AUTONOMOUS-BUILD-PROMPT.md
          test -f AUTONOMOUS-BUILD-SETUP-CHECKLIST.md

  # Stable aggregate status (named "check") so branch protection has a single context to
  # require regardless of the matrix dimensions.
  check:
    name: check
    needs: test
    runs-on: ubuntu-latest
    steps:
      - run: echo "all matrix jobs passed"
